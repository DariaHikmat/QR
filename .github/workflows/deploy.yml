name: Build and deploy QR app

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: app
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        working-directory: app
        run: pytest -q

  deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript frontend
        working-directory: frontend/src
        run: |
          npm install
          npm run build

      - name: Assemble deployment package
        run: |
          mkdir -p package/frontend
          cp app/main.py app/requirements.txt package/
          cp -r frontend/dist package/frontend/dist
          pip install \
            --target="package/.python_packages/lib/site-packages" \
            -r app/requirements.txt

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: package

      - name: Smoke test the live health endpoint
        run: |
          sleep 45
          url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz"
          echo "Checking $url"
          curl --fail --retry 6 --retry-delay 15 "$url"