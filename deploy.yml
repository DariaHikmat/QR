name: Build and deploy QR app
  ->  provision infra (Bicep)  ->  deploy app
on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Set these in your repo: Settings -> Secrets and variables -> Actions
#   Variables:  AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME
#   Secret:     AZURE_CREDENTIALS  (output of `az ad sp create-for-rbac --sdk-auth`)
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: app
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        working-directory: app
        run: pytest -q

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # Bundle the app code + the compiled frontend into one artifact
      # so the deploy job has everything it needs.
      - name: Assemble deployment package
        run: |
          mkdir -p package
          cp -r app/* package/
          mkdir -p package/../frontend-dist
          cp -r frontend/dist frontend-dist/dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: |
            app/
            frontend/dist/

  deploy:
    name: Provision + deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: .

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Provision (or update) the infrastructure described in main.bicep.
      # This is idempotent: re-running it just reconciles to the desired state.
      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: appName=${{ vars.AZURE_WEBAPP_NAME }}
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: app

      - name: Smoke test the live health endpoint
        run: |
          sleep 30  # give the app a moment to start
          url="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz"
          echo "Checking $url"
          curl --fail --retry 5 --retry-delay 15 "$url"
